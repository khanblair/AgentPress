site_name: AgentPress
site_description: Brand-Aware Autonomous Document Creation Pipeline — 6-Agent AI System
site_url: https://khanblair.github.io/AgentPress/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  font:
    text: Manrope
    code: JetBrains Mono

extra_css:
  - stylesheets/brand.css

nav:
  - Dashboard: index.md
  - Architecture: architecture.md
  - Agents: agents.md
  - Evolution Log: evolutions/index.md
  - Document Ledger: document_ledger/index.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/khanblair/AgentPress
